services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: antibiotic-ai-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - MODEL_PATH=/app/model/antibiotic_model.pkl
      - MODEL_METADATA_PATH=/app/model/model_metadata.json
      - ARMD_ARTIFACTS_DIR=/app/armd_model/artifacts
    volumes:
      - ./backend/model:/app/model
      - ./armd_model/artifacts:/app/armd_model/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - antibiotic-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: antibiotic-ai-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - antibiotic-network
    restart: unless-stopped

networks:
  antibiotic-network:
    driver: bridge
